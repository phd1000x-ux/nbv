name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Setup Rust toolchain (Linux/Windows)
        if: runner.os != 'macOS'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          cache: false
      # macos-latest ships ~/.cargo/bin/cargo as a symlink to a rustup-init
      # binary. rustup's multi-call dispatch resolves current_exe() through
      # the symlink and runs installer mode, so `cargo fmt` errors with
      # "unexpected argument 'fmt'". Wipe and reinstall from scratch so the
      # proxies are hardlinks to rustup, which dispatch correctly.
      - name: Bootstrap Rust toolchain (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$HOME/.cargo" "$HOME/.rustup"
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y \
                --default-toolchain stable \
                --profile minimal \
                --component rustfmt \
                --component clippy \
                --no-modify-path
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          # Functional dispatch check. The original flake was `cargo` running
          # as rustup-init installer (output "Usage: rustup-init[EXE]") instead
          # of dispatching to cargo. Grep the version output to fail fast at
          # bootstrap if proxies aren't dispatching, regardless of whether
          # they're hardlinks or symlinks to rustup.
          check() {
            local bin="$1" expect="$2"
            local out
            out=$("$HOME/.cargo/bin/$bin" --version 2>&1) || true
            if ! printf '%s' "$out" | grep -qE "^${expect} "; then
              echo "::error::$bin proxy not dispatching to $expect; got:"
              printf '%s\n' "$out"
              ls -la "$HOME/.cargo/bin/" || true
              exit 1
            fi
            printf '%s\n' "$out"
          }
          check cargo   cargo
          check rustc   rustc
          check rustfmt rustfmt
          "$HOME/.cargo/bin/cargo" clippy --version
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test --all

  audit:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
