name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Rust toolchain (Linux)
        if: runner.os == 'Linux'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          cache: false
      # macos-latest ships ~/.cargo/bin/cargo as a symlink to a rustup-init
      # binary. rustup's multi-call dispatch resolves current_exe() through
      # the symlink and runs installer mode, so `cargo fmt` errors with
      # "unexpected argument 'fmt'". Wipe and reinstall from scratch so the
      # proxies are hardlinks to rustup, which dispatch correctly.
      - name: Bootstrap Rust toolchain (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$HOME/.cargo" "$HOME/.rustup"
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y \
                --default-toolchain stable \
                --profile minimal \
                --component rustfmt \
                --component clippy \
                --no-modify-path
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/cargo" --version
          "$HOME/.cargo/bin/rustfmt" --version
          "$HOME/.cargo/bin/cargo" clippy --version
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test --all

  audit:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
