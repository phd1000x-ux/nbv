name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v0.2.0)'
        required: true
        type: string

jobs:
  release-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Install musl-tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          key: musl
      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Package
        id: pkg
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          NAME="nbv-${TAG}-x86_64-unknown-linux-musl.tar.gz"
          tar -czf "$NAME" -C target/x86_64-unknown-linux-musl/release nbv
          sha256sum "$NAME" > "$NAME.sha256"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.tag }}
          files: |
            ${{ steps.pkg.outputs.name }}
            ${{ steps.pkg.outputs.name }}.sha256
          fail_on_unmatched_files: true
